compute_environment: LOCAL_MACHINE

gpu_ids: "0,1,2,3"
num_processes: 4  # should be the same as the number of GPUs (4x L20)

debug: false
deepspeed_config:
  deepspeed_config_file: finetune/deepspeed_zero2.json  # DeepSpeed ZeRO-2 config file path
  zero3_init_flag: false  # Using ZeRO-2, not ZeRO-3
distributed_type: DEEPSPEED
downcast_bf16: 'no'
enable_cpu_affinity: false
machine_rank: 0
main_training_function: main
num_machines: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false

